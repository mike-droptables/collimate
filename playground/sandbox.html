<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox</title>
    <!--
      modulepreload hints — start fetching the heavy CDN modules in
      parallel with the renderer source fetch instead of waiting until
      the renderer's ``import`` statements parse to discover them.
      Saves a serial network round-trip per cold iframe.

      Pinned versions match what the bundled renderers (milkdown,
      excalidraw, monaco, terminal) import. Browsers ignore unknown /
      404 / not-yet-needed preload targets cheaply (no double-load,
      no console error if the matching import never happens), so
      listing all of them up front is safe even for iframes that only
      mount one renderer.

      DNS prefetch + preconnect cover any module a preload misses
      (e.g. transitive deps esm.sh resolves on its own).
    -->
    <link rel="dns-prefetch" href="https://esm.sh">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="preconnect" href="https://esm.sh" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="modulepreload" href="https://esm.sh/react@18">
    <link rel="modulepreload" href="https://esm.sh/@milkdown/crepe@7.19.1?deps=codemirror@6.0.1">
    <link rel="modulepreload" href="https://esm.sh/js-yaml@4.1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        #mount { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="mount"></div>
    <script type="module">
        // ---------------------------------------------------------------
        // 1. Internal postMessage plumbing (hidden from renderers)
        // ---------------------------------------------------------------
        const _pending = new Map();
        let _nextId = 1;
        const _filesChangedCbs = [];
        const _scrollRestoreCbs = [];
        const _themeChangeCbs = [];
        let _hasOnChange = false;

        // Theme signal — parent pushes a SET_THEME message on mount and on
        // every theme change. Cached here so synchronous api.getTheme()
        // calls (common at renderer bootstrap) resolve without a round
        // trip. Shape: { scheme, themeId, vars }. Defaults to 'dark'
        // with a noop vars map so renderers that race the parent's
        // first SET_THEME get something sane back instead of null.
        let _currentTheme = { scheme: 'dark', themeId: 'unknown', vars: {} };
        // Signalled once the renderer declares itself ready. Idempotent —
        // parent discards duplicates, but we guard here too so a renderer
        // calling ready() twice doesn't post two messages.
        let _readyFired = false;

        function _postToParent(msg) {
            window.parent.postMessage(msg, '*');
        }

        function _fireReady() {
            if (_readyFired) return;
            _readyFired = true;
            _postToParent({ type: 'RENDERER_READY' });
        }

        function _getSiblingFile(path) {
            return new Promise((resolve, reject) => {
                const id = _nextId++;
                const timer = setTimeout(() => {
                    if (_pending.has(id)) {
                        _pending.delete(id);
                        reject(new Error(`Timeout fetching sibling: ${path}`));
                    }
                }, 10000);
                _pending.set(id, { resolve, reject, timer });
                _postToParent({ type: 'SIBLING_REQUEST', id, path });
            });
        }

        // ---------------------------------------------------------------
        // 2. Message bus — routes parent replies to callbacks
        // ---------------------------------------------------------------
        window.addEventListener('message', (e) => {
            const data = e.data;
            if (!data || typeof data !== 'object') return;

            if (data.type === 'SIBLING_RESULT') {
                const p = _pending.get(data.id);
                if (p) {
                    clearTimeout(p.timer);
                    _pending.delete(data.id);
                    if (data.error) p.reject(new Error(data.error));
                    else p.resolve(data.content);
                }
            }

            if (data.type === 'FILES_CHANGED') {
                const detail = { cellId: data.cellId, changedFiles: data.changedFiles || [] };
                for (const cb of _filesChangedCbs) {
                    try { cb(detail); } catch (err) { console.error('files-changed callback error:', err); }
                }
            }

            if (data.type === 'RESTORE_SCROLL') {
                for (const cb of _scrollRestoreCbs) {
                    try { cb(data.scrollTop); } catch (err) { console.error('scroll-restore callback error:', err); }
                }
            }

            if (data.type === 'GET_SCROLL') {
                // Renderers register a scroll reporter via api.reportScroll — we
                // keep a last-known value and send it back.
                _postToParent({ type: 'SCROLL_REPORT', scrollTop: _lastScrollTop });
            }

            if (data.type === 'PING_READY') {
                // Pool re-use path: a new SandboxIframe just mounted over an
                // iframe that already finished its first-run setup. It missed
                // the original RENDERER_READY. If we already fired ready, echo
                // it back now so the new overlay drops immediately.
                if (_readyFired) _postToParent({ type: 'RENDERER_READY' });
            }

            if (data.type === 'SET_KEYBINDINGS') {
                // Parent pushed its current allowedInRenderer shortcut set.
                // We replace wholesale — parent is the source of truth and
                // reposts on remap. Safe to ignore malformed payloads.
                _forwardedCombos = Array.isArray(data.combos) ? data.combos : [];
            }

            if (data.type === 'SET_THEME') {
                // Parent pushed the current theme (scheme + vars). Also
                // mirrored onto the iframe's :root as CSS variables so
                // renderers that read `var(--void-main)` etc. in their
                // inline styles see the live theme without calling
                // api.getTheme(). Renderer authors who need fine-grained
                // JS control call api.onThemeChange(cb) instead.
                const scheme = data.scheme === 'light' ? 'light' : 'dark';
                const vars = (data.vars && typeof data.vars === 'object') ? data.vars : {};
                _currentTheme = { scheme, themeId: data.themeId || 'unknown', vars };
                const rootStyle = document.documentElement.style;
                for (const [k, v] of Object.entries(vars)) {
                    // Map camelCase ThemeVars keys to --kebab-case CSS vars,
                    // matching the host's applyVarsToRoot. Values are
                    // stringified — numeric tokens like bgGlowWarmOpacity
                    // need `String()` anyway.
                    const cssVar = '--' + k.replace(/([A-Z])/g, '-$1').toLowerCase();
                    rootStyle.setProperty(cssVar, typeof v === 'number' ? String(v) : v);
                }
                // color-scheme is what lets native controls (scrollbars,
                // form widgets) pick the right palette. Without this a
                // light app theme still shows black scrollbars.
                rootStyle.setProperty('color-scheme', scheme);
                document.documentElement.setAttribute('data-scheme', scheme);
                for (const cb of _themeChangeCbs) {
                    try { cb(_currentTheme); } catch (err) { console.error('theme-change callback error:', err); }
                }
            }
        });

        let _lastScrollTop = 0;

        // ---------------------------------------------------------------
        // 3. Keyboard forwarding — parent pushes a dynamic list of combos
        // it wants bubbled up out of the renderer. Combos arrive already
        // resolved to the host's platform (Mod → metaKey on Mac, ctrlKey
        // elsewhere) so the iframe just does a boolean compare.
        // ---------------------------------------------------------------
        let _forwardedCombos = [];
        function _eventMatchesCombo(e, c) {
            const evKey = (e.key && e.key.length === 1) ? e.key.toLowerCase() : e.key;
            const cKey  = (c.key && c.key.length === 1) ? c.key.toLowerCase() : c.key;
            if (evKey !== cKey) return false;
            if (Boolean(e.metaKey)  !== Boolean(c.metaKey))  return false;
            if (Boolean(e.ctrlKey)  !== Boolean(c.ctrlKey))  return false;
            if (Boolean(e.altKey)   !== Boolean(c.altKey))   return false;
            if (Boolean(e.shiftKey) !== Boolean(c.shiftKey)) return false;
            return true;
        }
        window.addEventListener('keydown', (e) => {
            for (const combo of _forwardedCombos) {
                if (!_eventMatchesCombo(e, combo)) continue;
                e.preventDefault();
                _postToParent({
                    type: 'FORWARD_KEYDOWN',
                    key: e.key, altKey: e.altKey, ctrlKey: e.ctrlKey,
                    shiftKey: e.shiftKey, metaKey: e.metaKey
                });
                return;
            }
        }, { capture: true });

        // ---------------------------------------------------------------
        // 3b. Esc double-tap — let the renderer dismiss its own popups
        // (Crepe slash menu, Monaco intellisense, …) on a single Esc,
        // and forward to the host only on a second Esc within 600ms.
        // Registered with capture:true and runs BEFORE the generic
        // forwarder above — we call stopImmediatePropagation so the
        // same key press can't also trip the generic loop (which might
        // forward EDITOR_CLOSE if a future registry entry turned it
        // back on).
        // ---------------------------------------------------------------
        let _lastEscAt = 0;
        const _ESC_DOUBLE_MS = 600;
        window.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            // Ignore Shift/Alt/Ctrl/Meta+Esc — those are distinct
            // combos and not part of the close-editor gesture.
            if (e.shiftKey || e.altKey || e.ctrlKey || e.metaKey) return;
            const now = Date.now();
            if (now - _lastEscAt < _ESC_DOUBLE_MS) {
                // Second Esc — forward to host.
                e.preventDefault();
                e.stopImmediatePropagation();
                _postToParent({
                    type: 'FORWARD_KEYDOWN',
                    key: 'Escape',
                    altKey: false, ctrlKey: false, shiftKey: false, metaKey: false,
                });
                _lastEscAt = 0;
                return;
            }
            // First Esc — let the renderer handle it (Crepe slash
            // menu close, etc.). Stop the generic forwarder from
            // also firing on this key.
            e.stopImmediatePropagation();
            _lastEscAt = now;
        }, { capture: true });

        // ---------------------------------------------------------------
        // 4. Init — build unified API, fetch content, mount renderer
        // ---------------------------------------------------------------
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const rendererId = params.get('renderer');
            const hashUrl = params.get('hash');
            const diffHashUrl = params.get('diff');
            const filename = params.get('filename') || '';
            const cellId = params.get('cellId') || '';
            const rendererVersion = params.get('rv') || '';
            let apiBase = params.get('apiBase') || '';
            if (apiBase.endsWith('/')) apiBase = apiBase.slice(0, -1);

            const mountEl = document.getElementById('mount');

            // Pre-fetch primary file content
            let content = '';
            if (hashUrl) {
                try { content = await fetch(hashUrl).then(r => r.text()); }
                catch (err) { console.warn('Failed to pre-fetch content:', err); }
            }

            // Pre-fetch diff content if present
            let diffContent = null;
            if (diffHashUrl) {
                try { diffContent = await fetch(diffHashUrl).then(r => r.text()); }
                catch (err) { console.warn('Failed to pre-fetch diff content:', err); }
            }

            _hasOnChange = true; // always expose onChange; parent decides readOnly

            // --- Build the unified Renderer API object ---
            const api = {
                getContent:      async () => content,
                getDiffContent:  async () => diffContent,
                getFilename:     () => filename,
                getCellId:       () => cellId,
                getSiblingFile:  (path) => _getSiblingFile(path),
                onChange:        (c) => _postToParent({ type: 'FILE_UPDATED', content: c }),
                onFilesChanged:  (cb) => { _filesChangedCbs.push(cb); return () => { const i = _filesChangedCbs.indexOf(cb); if (i >= 0) _filesChangedCbs.splice(i, 1); }; },
                onScrollRestore: (cb) => { _scrollRestoreCbs.push(cb); return () => { const i = _scrollRestoreCbs.indexOf(cb); if (i >= 0) _scrollRestoreCbs.splice(i, 1); }; },
                reportScroll:    (top) => { _lastScrollTop = top; },
                isReadOnly:      () => false,
                // Helpers for style/script injection that work in both iframe and Shadow DOM
                injectStyle:     (css) => { const el = document.createElement('style'); el.textContent = css; document.head.appendChild(el); },
                // Returns a Promise that resolves when the stylesheet has actually
                // loaded — crepe/milkdown needs this so it can await CSS before
                // calling api.ready() and revealing the editor. Without awaiting,
                // the iframe paints unstyled content during the brief load window.
                loadCSS: (href) => {
                    const existing = document.querySelector(`link[href="${href}"]`);
                    if (existing) {
                        if (existing.sheet) return Promise.resolve();
                        return new Promise(resolve => {
                            existing.addEventListener('load', () => resolve(), { once: true });
                            existing.addEventListener('error', () => resolve(), { once: true });
                        });
                    }
                    const l = document.createElement('link');
                    l.rel = 'stylesheet';
                    l.href = href;
                    return new Promise(resolve => {
                        l.addEventListener('load', () => resolve(), { once: true });
                        l.addEventListener('error', () => resolve(), { once: true });
                        document.head.appendChild(l);
                    });
                },
                // Renderer signals "I'm fully painted — drop the overlay." The
                // parent also arms a timeout fallback so a broken renderer never
                // leaves the overlay up forever.
                ready: () => _fireReady(),
                // Theme signal. `getTheme()` returns a snapshot of the
                // host's current theme; `onThemeChange(cb)` subscribes
                // to SET_THEME messages so editors can hot-swap their
                // internal theme (Monaco vs-dark ↔ vs, Crepe dark/light
                // stylesheets, …). cb is invoked with the new snapshot
                // AND immediately on subscribe with the current theme,
                // so renderers don't need to call getTheme() separately.
                getTheme: () => _currentTheme,
                onThemeChange: (cb) => {
                    _themeChangeCbs.push(cb);
                    // Fire immediately so subscribers see the current
                    // scheme without a second round trip.
                    try { cb(_currentTheme); } catch (err) { console.error('theme-change callback error:', err); }
                    return () => {
                        const i = _themeChangeCbs.indexOf(cb);
                        if (i >= 0) _themeChangeCbs.splice(i, 1);
                    };
                },
            };

            // Legacy compat — set window.sdk so renderers in transition can still use it
            window.sdk = {
                content,
                filename,
                cellId,
                getSiblingFile: api.getSiblingFile,
                onChange: api.onChange,
                onFilesChanged: api.onFilesChanged,
            };

            function loadScript(src) {
                return new Promise((resolve, reject) => {
                    if (document.querySelector(`script[src="${src}"]`)) return resolve();
                    const s = document.createElement('script');
                    s.src = src;
                    s.onload = resolve;
                    s.onerror = reject;
                    document.head.appendChild(s);
                });
            }

            try {
                const cacheBust = rendererVersion ? `?v=${rendererVersion}` : '';
                const sourceUrl = apiBase
                    ? `${apiBase}/api/renderers/${rendererId}/source${cacheBust}`
                    : `/api/renderers/${rendererId}/source${cacheBust}`;

                let moduleObj;
                try {
                    const res = await fetch(sourceUrl);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    const entrypoint = res.headers.get('X-Entrypoint') || '';
                    const isTypeScript = entrypoint.endsWith('.ts') || entrypoint.endsWith('.tsx');

                    // Source needs the same import-rewrite + blob-URL
                    // dance whether it arrived as TypeScript (transpiled
                    // here) or as pre-compiled JavaScript (compiled at
                    // build time by ``build_server.sh`` / ``assemble_
                    // site.sh``). Two reasons:
                    //   * Root-relative ``/api/sdk/...`` imports inside
                    //     the module need to resolve against the
                    //     iframe's apiBase, not against ``window.
                    //     location.origin``. The renderer source can't
                    //     hardcode a base; the sandbox rewrites at load.
                    //   * A Blob URL has no base URL of its own, so
                    //     once the rewrite turns the relative paths
                    //     into absolute URLs, the resulting module
                    //     loads cleanly under any apiBase shape.
                    // Earlier the rewrite + blob lived only in the
                    // TypeScript branch, so the fast .js path imported
                    // sourceUrl directly — which made root-relative
                    // /api/sdk imports resolve against the page origin
                    // and fail with "Failed to fetch dynamically
                    // imported module" on any sandbox served from a
                    // path that isn't the API root.
                    let sourceCode = await res.text();
                    const fullApiBase = apiBase.startsWith('http')
                        ? apiBase
                        : new URL(apiBase + '/', window.location.href).toString().replace(/\/$/, '');
                    sourceCode = sourceCode.replace(/['"]\/api\/sdk\/(.*?)['"]/g, `"${fullApiBase}/api/sdk/$1"`);

                    if (isTypeScript) {
                        await loadScript('https://unpkg.com/@babel/standalone/babel.min.js');
                        sourceCode = Babel.transform(sourceCode, {
                            presets: ['typescript', ['react', { runtime: 'classic' }]],
                            filename: entrypoint
                        }).code;
                    }
                    const blob = new Blob([sourceCode], { type: 'application/javascript' });
                    const finalUrl = URL.createObjectURL(blob);

                    moduleObj = await import(finalUrl);
                } catch (err) {
                    throw new Error(`Failed to load renderer from ${sourceUrl}: ${err.message}`);
                }

                // Unwrap default export for new SDK renderers
                const renderer = moduleObj.default || moduleObj;

                if (diffHashUrl && typeof renderer.mountDiff === 'function') {
                    await renderer.mountDiff(mountEl, api);
                } else if (typeof renderer.mount === 'function') {
                    await renderer.mount(mountEl, api);
                } else {
                    mountEl.innerHTML = `<div style="color:red;padding:10px;font-family:monospace;">Renderer '${rendererId}' does not export mount()</div>`;
                }
            } catch (err) {
                console.error(err);
                mountEl.innerHTML = `<div style="color:red;padding:10px;font-family:monospace;">Failed to load renderer: ${err.message}</div>`;
            }
        }

        // ---------------------------------------------------------------
        // 5. Wait for layout before init (prevents narrow-mode lock)
        // ---------------------------------------------------------------
        function waitForWidth() {
            if (window.innerWidth > 100) return Promise.resolve();
            return new Promise(resolve => {
                requestAnimationFrame(function poll() {
                    if (window.innerWidth > 100) { resolve(); return; }
                    requestAnimationFrame(poll);
                });
            });
        }

        waitForWidth().then(init);
    </script>
</body>
</html>
